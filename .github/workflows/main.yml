name: Daily Sovereign Gazette
on:
  schedule:
    # 14:00 UTC is 07:00 MST
    - cron: '0 14 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Upgraded to v4 for better speed and security

      - name: Set up Python
        uses: actions/setup-python@v5 # Upgraded to v5 to avoid node version deprecation warnings
        with:
          python-version: '3.11' # Upgraded to 3.11 for faster package installations

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install discord.py requests feedparser

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python bot.py
